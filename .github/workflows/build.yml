name: build-executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow
      - name: Build CLI executable
        run: pyinstaller --onefile --name dewarp --collect-submodules scipy --hidden-import magenta_text --add-data "icon.png:." dewarp_cli.py
      - name: Build GUI executable
        run: pyinstaller --onefile --windowed --name dewarp-gui --collect-submodules scipy --hidden-import magenta_text --hidden-import reconstruct --add-data "icon.png:." --icon icon.png dewarp_gui.py
      # Package the CLI + GUI pair into one clearly-named zip per OS. Keeping the two
      # executables together matters: the GUI runs reconstruction by calling the sibling
      # dewarp/dewarp.exe in the same folder.
      - name: Package per-OS zip
        run: python -c "import shutil; shutil.make_archive('Dewarp-${{ matrix.label }}', 'zip', 'dist')"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dewarp-${{ matrix.label }}
          path: Dewarp-${{ matrix.label }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach zips to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
