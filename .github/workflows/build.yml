name: Build Windows EXE

# Runs when you push, and also lets you trigger it by hand from the Actions tab
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest          # a Windows machine in the cloud
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'      # 3.12 has all the wheels (not 3.14)

      - name: Install build tool + libraries
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller opencv-python scipy numpy pillow

      - name: Build the app
        run: pyinstaller --noconfirm --console --onedir --name SpectrumReconstructor --collect-all cv2 --collect-all scipy reconstruct.py

      - name: Package the finished app for download
        uses: actions/upload-artifact@v4
        with:
          name: SpectrumReconstructor-windows
          path: dist/SpectrumReconstructor
